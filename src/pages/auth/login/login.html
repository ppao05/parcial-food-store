<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Login - Food Store</title>
</head>

<body class="login-body">

  <div class="login-container">

    <h1 class="login-title">Food Store 🍔</h1>

    <p class="login-subtitle">
      Iniciá sesión para continuar
    </p>

    <form id="login-form" class="login-form">

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required
      />

      <button type="submit">
        Ingresar
      </button>

    </form>

    <div class="demo-users">
  <p>
    ¿No tenés cuenta?
    <a href="../registro/registro.html" class="register-link">
      Registrate
    </a>
  </p>
</div>


    <div class="demo-users">

      <p><strong>Cliente:</strong> user@gmail.com / 1234</p>

      <p><strong>Admin:</strong> admin@gmail.com / 1234</p>

    </div>

  </div>

  <script type="module" src="./login.ts"></script>

</body>
</html>
