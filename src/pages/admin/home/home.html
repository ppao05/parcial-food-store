<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Admin Panel</title>
</head>

<body>

  <header class="header">
    <h1 class="logo">Panel Administrador ⚙️</h1>

    <div class="header-actions">
      <a href="../../auth/login/login.html" class="back-login-btn">
        ← Login
      </a>

      <a href="../../store/home/home.html" class="cart-link">
        Ver Tienda
      </a>
    </div>
  </header>

  <div class="admin-container">

    <div class="admin-nav">
      <a href="../categories/categories.html" class="go-store-btn">
        Categorías
      </a>

      <a href="../products/products.html" class="go-store-btn">
        Productos
      </a>

      <a href="../orders/orders.html" class="go-store-btn">
        Pedidos
      </a>
    </div>

    <div class="stats-grid">

      <div class="stat-card">
        <h2 id="total-products">0</h2>
        <p>Productos Totales</p>
      </div>

      <div class="stat-card">
        <h2 id="available-products">0</h2>
        <p>Productos Disponibles</p>
      </div>

      <div class="stat-card">
        <h2 id="out-stock">0</h2>
        <p>Sin Stock</p>
      </div>

      <div class="stat-card">
        <h2 id="total-categories">0</h2>
        <p>Categorías</p>
      </div>

    </div>

  </div>

  <script type="module" src="./home.ts"></script>

</body>
</html>
