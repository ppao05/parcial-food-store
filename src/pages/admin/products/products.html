<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos</title>
</head>

<body>

<header class="header">
  <h1 class="logo">Gestión de Productos</h1>

  <div class="header-actions">
    <a href="../home/home.html" class="back-login-btn">
      ← Dashboard
    </a>
  </div>
</header>

<main class="content">

  <section class="admin-form-box">
    <h2 id="form-title">Nuevo Producto</h2>

    <form id="product-form">
      <input type="hidden" id="product-id">

      <input type="text" id="product-name" placeholder="Nombre" required>

      <input type="text" id="product-description" placeholder="Descripción" required>

      <input type="number" id="product-price" placeholder="Precio" required>

      <input type="number" id="product-stock" placeholder="Stock" required>

      <select id="product-category" required>
        <option value="">Seleccionar categoría</option>
      </select>

      <input type="text" id="product-image" placeholder="URL de imagen" required>

      <label class="checkbox-label">
        <input type="checkbox" id="product-available" checked>
        Disponible
      </label>

      <button type="submit" class="add-btn">
        Guardar
      </button>

      <button type="button" id="cancel-edit" class="back-login-btn">
        Cancelar edición
      </button>
    </form>
  </section>

  <table class="admin-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Imagen</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Categoría</th>
        <th>Stock</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody id="products-body"></tbody>
  </table>

</main>

<script type="module" src="./products.ts"></script>

</body>
</html>
